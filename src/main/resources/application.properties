# SPRING BOOT CONFIGURATION
spring.config.import=optional:file:.env.properties

server.port=8080
spring.application.name=plantcare

# DATABASE (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/plantcare}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:ducanh0103}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT SECURITY
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# CLOUDINARY
cloudinary.cloud-name=dyyyohye4
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# GEMINI AI
gemini.api-key=${GEMINI_API_KEY}
gemini.api-url=https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent

# OPENWEATHERMAP
weather.api-key=${WEATHER_API_KEY}
weather.api-url=https://api.openweathermap.org/data/2.5/weather

# MULTIPART
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ENCODING (UTF-8)
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# FIREBASE
firebase.service-account-path=${FIREBASE_KEY_PATH}
